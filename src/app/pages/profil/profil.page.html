<ion-header>
  <ion-toolbar>
    <ion-title>Mon Profil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="profil-wrapper">
    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-preview">
        <img [src]="avatarUrl" alt="Avatar" (error)="onAvatarError($event)" />
      </div>
      <h2 class="user-name">{{ nomComplet || 'Utilisateur' }}</h2>
      <span class="user-role">{{ profilRole || 'Enrôleur' }}</span>
    </div>

    <!-- Infos -->
    <div class="card-modern">
      <div class="card-header-modern">
        <h3><ion-icon name="person-circle"></ion-icon> Informations</h3>
      </div>
      <div class="card-body-modern">
        <div class="info-row">
          <span class="lbl"><ion-icon name="person"></ion-icon> Login</span>
          <span class="val">{{ loginName }}</span>
        </div>
        <div class="info-row">
          <span class="lbl"><ion-icon name="text"></ion-icon> Nom complet</span>
          <span class="val">{{ nomComplet || 'N/A' }}</span>
        </div>
        <div class="info-row">
          <span class="lbl"><ion-icon name="mail"></ion-icon> Email</span>
          <span class="val">{{ email || 'N/A' }}</span>
        </div>
        <div class="info-row">
          <span class="lbl"><ion-icon name="shield-checkmark"></ion-icon> Profil</span>
          <span class="val">{{ profilRole || 'N/A' }}</span>
        </div>
        <div class="info-row">
          <span class="lbl"><ion-icon name="server"></ion-icon> Serveur</span>
          <span class="val">{{ serverIP }}</span>
        </div>
        <div class="info-row">
          <span class="lbl"><ion-icon name="time"></ion-icon> Dernier accès</span>
          <span class="val">{{ dernierAcces || 'N/A' }}</span>
        </div>
      </div>
    </div>
  </div>
</ion-content>
