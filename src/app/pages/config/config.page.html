<ion-content class="config-page" [scrollY]="false">
  <div class="config-container">
    <!-- Logo section identique au login -->
    <div class="config-logo">
      <a class="brand-link">
        <img src="assets/img/logo-fardc.png" alt="FARDC Logo" class="brand-image">
        <span class="brand-text">CTL EFF MIL - FARDC Mobile v1.2.0</span>
      </a>
    </div>

    <!-- Carte formulaire (même style que login) -->
    <div class="card-modern">
      <div class="form-header">
        <div class="title">Configuration</div>
        <div class="subtitle">
          <ion-icon name="wifi"></ion-icon>
          <span>Serveur API</span>
        </div>
      </div>

      <div class="config-form">
        <!-- Champ IP (saisie manuelle) -->
        <div class="input-group-modern">
          <ion-icon name="wifi" class="input-icon"></ion-icon>
          <ion-input
            type="text"
            [(ngModel)]="serverIP"
            placeholder="Ex: 10.71.62.9"
            autocorrect="off"
            [readonly]="false"
          ></ion-input>
        </div>

        <p class="help-text">
          <ion-icon name="information-circle-outline"></ion-icon>
          Saisissez manuellement l'adresse IP du serveur local
        </p>

        @if (connectionOk !== null && !detecting) {
          <div class="connection-status" [class.success]="connectionOk" [class.error]="!connectionOk">
            <ion-icon [name]="connectionOk ? 'checkmark-circle' : 'close-circle'"></ion-icon>
            {{ connectionMessage }}
          </div>
        }

        <!-- Bouton tester (même taille que btn-login) -->
        <button type="button" class="btn-test" (click)="testConnection()" [disabled]="testing || detecting || !serverIP.trim()">
          @if (testing) {
            <ion-spinner name="crescent"></ion-spinner>
            Test en cours...
          } @else {
            <ion-icon name="wifi"></ion-icon>
            Tester la connexion
          }
        </button>

        <!-- Bouton continuer (même taille que btn-config) -->
        <button type="button" class="btn-continue" (click)="saveAndContinue()" [disabled]="!connectionOk || detecting">
          <ion-icon name="arrow-forward"></ion-icon>
          Continuer
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="config-footer">
      <ion-icon name="shield-checkmark"></ion-icon>  IG FARDC
    </div>
  </div>
</ion-content>
