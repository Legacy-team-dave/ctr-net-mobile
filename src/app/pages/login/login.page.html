<ion-content class="login-page" [scrollY]="true">
  <div class="login-container">
    <!-- Logo section identique au web -->
    <div class="login-logo">
      <a class="brand-link">
        <img src="assets/img/logo-fardc.png" alt="FARDC Logo" class="brand-image">
        <span class="brand-text">IG-FARDC</span>
      </a>
    </div>

    <!-- Carte formulaire -->
    <div class="card-modern">
      <div class="form-header">
        <div class="title">Connexion</div>
        <div class="subtitle">
          <ion-icon name="lock-closed"></ion-icon>
          <span>CONTROLEUR</span>
        </div>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <!-- Champ login -->
        <div class="input-group-modern">
          <ion-icon name="person" class="input-icon"></ion-icon>
          <ion-input
            type="text"
            [(ngModel)]="login"
            name="login"
            placeholder="Identifiant, email ou nom"
            autocomplete="username"
            autocorrect="off"
            autocapitalize="off"
            required
          ></ion-input>
        </div>

        <!-- Champ mot de passe -->
        <div class="input-group-modern">
          <ion-icon name="lock-closed" class="input-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Mot de passe"
            autocomplete="current-password"
            required
          ></ion-input>
          <span class="password-toggle" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </span>
        </div>

        @if (errorMessage) {
          <div class="error-message">
            <ion-icon name="alert-circle"></ion-icon>
            {{ errorMessage }}
          </div>
        }

        <!-- Bouton connexion jaune comme le web -->
        <button type="submit" class="btn-login" [disabled]="loading">
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
            Connexion...
          } @else {
            <ion-icon name="log-in"></ion-icon>
            Se connecter
          }
        </button>
      </form>

      <!-- Séparateur -->
      <div class="separator"><span>ou</span></div>

      <!-- Bouton config serveur -->
      <button class="btn-config" (click)="goToConfig()">
        <ion-icon name="settings"></ion-icon>
        Configurer le serveur
      </button>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <ion-icon name="shield-checkmark"></ion-icon>  CTR.NET-FARDC Mobile v1.1.0
    </div>
  </div>
</ion-content>
