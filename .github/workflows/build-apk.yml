name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npx ng build --configuration production

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ctr.net-fardc-mobile
          path: android/app/build/outputs/apk/debug/ctr.net-fardc-mobile.apk

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CTR.NET Mobile v${{ steps.version.outputs.version }}
          body: |
            ## CTR.NET FARDC Mobile v${{ steps.version.outputs.version }}

            APK debug pour installation directe sur Android.

            ### Installation
            1. Télécharger `ctr.net-fardc-mobile.apk`
            2. Autoriser les sources inconnues sur votre appareil
            3. Installer l'APK
          files: android/app/build/outputs/apk/debug/ctr.net-fardc-mobile.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
