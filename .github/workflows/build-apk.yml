name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'angular.json'
      - 'capacitor.config.ts'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare APK artifacts
        id: prep
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK_SOURCE=$(find android/app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | head -n 1)

          if [ -z "$APK_SOURCE" ]; then
            echo "APK introuvable dans android/app/build/outputs/apk/debug" >&2
            ls -R android/app/build/outputs || true
            exit 1
          fi

          mkdir -p dist/apk
          cp "$APK_SOURCE" "dist/apk/ctr-net-mobile-v${VERSION}-debug.apk"
          cp "$APK_SOURCE" "dist/apk/ctr-net-mobile-latest-debug.apk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_source=${APK_SOURCE}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctr-net-mobile-apk-v${{ steps.prep.outputs.version }}
          path: |
            dist/apk/ctr-net-mobile-v${{ steps.prep.outputs.version }}-debug.apk
            dist/apk/ctr-net-mobile-latest-debug.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_name == 'main' || github.ref_name == 'master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep.outputs.version }}
          name: CTR.NET Mobile v${{ steps.prep.outputs.version }}
          generate_release_notes: true
          files: |
            dist/apk/ctr-net-mobile-v${{ steps.prep.outputs.version }}-debug.apk
            dist/apk/ctr-net-mobile-latest-debug.apk
